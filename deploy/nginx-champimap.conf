# ChampiMap — reverse proxy nginx vers l'app FastAPI (uvicorn sur 127.0.0.1:8000).
# Déposer dans /etc/nginx/sites-available/champimap puis lier dans sites-enabled.
# Remplacer `server_name` par votre domaine, puis lancer :
#     sudo certbot --nginx -d votre-domaine.fr
# certbot ajoutera automatiquement le bloc HTTPS (443) + la redirection 80→443
# (en recopiant ce server{} ; les en-têtes/limites ci-dessous s'appliqueront alors en 443).

# --- Limitation de débit (anti-DoS / anti-brute-force) ---
# Ces directives sont en contexte http (ce fichier est inclus dans http{} via
# sites-enabled). `champi_login` est strict car /api/login fait du bcrypt (coûteux
# CPU) et est la cible des attaques par force brute.
limit_req_zone  $binary_remote_addr zone=champi_login:10m rate=10r/m;
limit_req_zone  $binary_remote_addr zone=champi_api:10m   rate=20r/s;
limit_conn_zone $binary_remote_addr zone=champi_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name _;            # <-- remplacer par : votre-domaine.fr

    client_max_body_size 5m;
    limit_conn champi_conn 20;          # max 20 connexions simultanées par IP

    # En-têtes de sécurité (complètent ceux posés par l'app). HSTS prend effet en HTTPS.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # En-têtes de proxy communs (hérités par les location ci-dessous).
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;            # rendu d'overlays parfois long

    # Connexion : strictement limitée (bcrypt + cible brute-force).
    location = /api/login {
        limit_req zone=champi_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
    }

    # Reste de l'API : limite générale par IP.
    location /api/ {
        limit_req zone=champi_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8000;
    }

    # Frontend + statique + overlays.
    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
